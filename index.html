<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Heosi Games</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #5c667a;
      --accent: #1f6feb;
      --border: #d8dfeb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top, #ffffff 0%, #f5f7fb 55%, #edf2fa 100%);
      color: var(--text);
    }

    main {
      width: min(100%, 720px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(23, 32, 51, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 2.8rem);
    }

    p {
      margin: 0 0 16px;
      line-height: 1.6;
      color: var(--muted);
    }

    a {
      color: var(--accent);
    }

    ul {
      margin: 24px 0 0;
      padding-left: 20px;
    }

    li + li {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Heosi Games</h1>
    <p>This site is used for public app information and advertising verification.</p>
    <ul>
      <li><a href="/app-ads.txt">app-ads.txt</a></li>
      <li><a href="https://sohn93.github.io/heosigames-legal/">Legal pages</a></li>
    </ul>
  </main>
</body>
</html>
